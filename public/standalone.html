<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Downloader - Standalone Test</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #ffffff;
            color: #333;
            padding: 20px;
            transition: all 0.3s;
        }

        body.dark-mode {
            background: #111827;
            color: #f3f4f6;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        /* Dark Mode Toggle */
        .dark-mode-toggle {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 48px;
            height: 48px;
            background: white;
            border: 2px solid #e5e7eb;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            z-index: 1000;
        }

        body.dark-mode .dark-mode-toggle {
            background: #1f2937;
            border-color: #374151;
        }

        .dark-mode-toggle:hover {
            transform: scale(1.1);
        }

        .hidden {
            display: none;
        }

        .header {
            text-align: center;
            margin: 60px 0 40px;
        }

        .title {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
        }

        body.dark-mode .subtitle {
            color: #9ca3af;
        }

        .main-tool {
            background: #f8f9fa;
            padding: 30px;
            border-radius: 16px;
            margin-bottom: 30px;
        }

        body.dark-mode .main-tool {
            background: #1f2937;
        }

        .input-wrapper {
            position: relative;
            margin-bottom: 20px;
        }

        .url-input {
            width: 100%;
            padding: 15px 60px 15px 15px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 16px;
        }

        body.dark-mode .url-input {
            background: #111827;
            border-color: #374151;
            color: #f3f4f6;
        }

        .paste-btn {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: #f3f4f6;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .paste-btn:hover {
            background: #10b981;
            border-color: #10b981;
            color: white;
        }

        .download-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
        }

        .download-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
        }

        .status.success {
            background: #d1fae5;
            color: #065f46;
        }

        .status.error {
            background: #fee2e2;
            color: #991b1b;
        }

        body.dark-mode .status.success {
            background: #064e3b;
            color: #10b981;
        }

        body.dark-mode .status.error {
            background: #7f1d1d;
            color: #f87171;
        }

        .preview-card {
            background: white;
            border: 2px solid #e5e7eb;
            border-radius: 16px;
            padding: 20px;
            margin-top: 20px;
        }

        body.dark-mode .preview-card {
            background: #1f2937;
            border-color: #374151;
        }

        .preview-info {
            margin-bottom: 15px;
        }

        .preview-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .preview-platform {
            color: #6b7280;
            font-size: 14px;
        }

        .preview-actions {
            display: flex;
            gap: 10px;
        }

        .confirm-btn,
        .cancel-btn {
            flex: 1;
            padding: 12px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .confirm-btn {
            background: #10b981;
            color: white;
            border: none;
        }

        .confirm-btn:hover {
            background: #059669;
        }

        .cancel-btn {
            background: #f3f4f6;
            color: #6b7280;
            border: 2px solid #e5e7eb;
        }

        .cancel-btn:hover {
            background: #e5e7eb;
        }
    </style>
</head>

<body>
    <!-- Dark Mode Toggle -->
    <button id="darkModeToggle" class="dark-mode-toggle">
        <svg id="sunIcon" width="20" height="20" viewBox="0 0 20 20" fill="none">
            <circle cx="10" cy="10" r="4" stroke="currentColor" stroke-width="2" />
            <path
                d="M10 2V4M10 16V18M18 10H16M4 10H2M15.657 4.343L14.243 5.757M5.757 14.243L4.343 15.657M15.657 15.657L14.243 14.243M5.757 5.757L4.343 4.343"
                stroke="currentColor" stroke-width="2" />
        </svg>
        <svg id="moonIcon" class="hidden" width="20" height="20" viewBox="0 0 20 20" fill="none">
            <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z" stroke="currentColor"
                stroke-width="2" />
        </svg>
    </button>

    <div class="container">
        <header class="header">
            <h1 class="title">🎬 Video Downloader Test</h1>
            <p class="subtitle">Testing all features without backend</p>
        </header>

        <main class="main-tool">
            <div class="input-wrapper">
                <input type="text" id="videoUrl" class="url-input" placeholder="Paste video URL here">
                <button id="pasteBtn" class="paste-btn" title="Paste from clipboard">
                    📋
                </button>
            </div>

            <button id="downloadBtn" class="download-btn">Test Features</button>

            <div id="status" class="status hidden"></div>

            <div id="previewCard" class="preview-card hidden">
                <div class="preview-info">
                    <h3 class="preview-title" id="previewTitle">Video Title</h3>
                    <p class="preview-platform" id="previewPlatform">Platform</p>
                </div>
                <div class="preview-actions">
                    <button id="confirmBtn" class="confirm-btn">Confirm</button>
                    <button id="cancelBtn" class="cancel-btn">Cancel</button>
                </div>
            </div>
        </main>

        <div style="background: #f3f4f6; padding: 20px; border-radius: 12px; margin-top: 20px;">
            <h3>✅ Feature Status:</h3>
            <ul id="featureStatus" style="margin-top: 10px; line-height: 2;">
                <li>🌙 Dark Mode: <span id="darkStatus">Not tested</span></li>
                <li>📋 Auto-Paste: <span id="pasteStatus">Not tested</span></li>
                <li>🎬 Preview Card: <span id="previewStatus">Not tested</span></li>
                <li>🔘 Download Button: <span id="btnStatus">Not tested</span></li>
            </ul>
        </div>
    </div>

    <script>
        // Elements
        const darkModeToggle = document.getElementById('darkModeToggle');
        const sunIcon = document.getElementById('sunIcon');
        const moonIcon = document.getElementById('moonIcon');
        const pasteBtn = document.getElementById('pasteBtn');
        const videoUrl = document.getElementById('videoUrl');
        const downloadBtn = document.getElementById('downloadBtn');
        const status = document.getElementById('status');
        const previewCard = document.getElementById('previewCard');
        const previewTitle = document.getElementById('previewTitle');
        const previewPlatform = document.getElementById('previewPlatform');
        const confirmBtn = document.getElementById('confirmBtn');
        const cancelBtn = document.getElementById('cancelBtn');

        // Status elements
        const darkStatus = document.getElementById('darkStatus');
        const pasteStatus = document.getElementById('pasteStatus');
        const previewStatus = document.getElementById('previewStatus');
        const btnStatus = document.getElementById('btnStatus');

        // Dark Mode
        darkModeToggle.addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            sunIcon.classList.toggle('hidden', isDark);
            moonIcon.classList.toggle('hidden', !isDark);
            darkStatus.textContent = '✅ Working!';
            darkStatus.style.color = 'green';
            showStatus(`Dark mode ${isDark ? 'enabled' : 'disabled'}`, 'success');
        });

        // Auto-Paste
        pasteBtn.addEventListener('click', async () => {
            try {
                const text = await navigator.clipboard.readText();
                videoUrl.value = text;
                pasteStatus.textContent = '✅ Working!';
                pasteStatus.style.color = 'green';
                showStatus('Pasted from clipboard!', 'success');
            } catch (err) {
                pasteStatus.textContent = '❌ Failed (permission needed)';
                pasteStatus.style.color = 'red';
                showStatus('Clipboard access denied. Try Ctrl+V', 'error');
            }
        });

        // Download Button
        downloadBtn.addEventListener('click', () => {
            const url = videoUrl.value.trim();

            if (!url) {
                showStatus('Please enter a URL', 'error');
                return;
            }

            btnStatus.textContent = '✅ Working!';
            btnStatus.style.color = 'green';

            // Show preview
            previewTitle.textContent = 'Test Video';
            previewPlatform.textContent = 'From Test Platform';
            previewCard.classList.remove('hidden');
            previewStatus.textContent = '✅ Working!';
            previewStatus.style.color = 'green';

            showStatus('Preview shown successfully!', 'success');
        });

        // Preview actions
        confirmBtn.addEventListener('click', () => {
            showStatus('Confirm button works! (Backend needed for actual download)', 'success');
        });

        cancelBtn.addEventListener('click', () => {
            previewCard.classList.add('hidden');
            showStatus('Preview cancelled', 'success');
        });

        function showStatus(message, type) {
            status.textContent = message;
            status.className = `status ${type}`;
            status.classList.remove('hidden');

            setTimeout(() => {
                status.classList.add('hidden');
            }, 3000);
        }

        // Initial message
        setTimeout(() => {
            showStatus('👋 All features loaded! Try them out!', 'success');
        }, 500);
    </script>
</body>

</html>
